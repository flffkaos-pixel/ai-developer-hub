<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - AI Developer Hub</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0,200" />
  <style>
  .auth-page{display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 72px);padding:40px 24px}
  .auth-card{width:100%;max-width:420px;padding:36px;border-radius:var(--radius-lg);background:var(--surface);border:1px solid var(--border)}
  .auth-card h2{text-align:center;font-family:'Hanken Grotesk',sans-serif;font-size:1.5rem;margin-bottom:24px}
  .auth-card input{width:100%;padding:12px 16px;margin-bottom:12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface-deep);color:var(--text);font-size:.95rem;transition:var(--transition)}
  .auth-card input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-bg)}
  .auth-card .btn{width:100%;padding:12px;font-size:1rem;justify-content:center}
  .auth-card .error{color:var(--error);font-size:.85rem;margin-bottom:12px;text-align:center}
  .auth-card .auth-link{text-align:center;margin-top:16px;color:var(--text-muted);font-size:.88rem}
  .auth-card .auth-link a{color:var(--primary);font-weight:500}
  </style>
  <script src="/lang.js"></script>
</head>
<body>
  <nav>
    <div class="nav-inner">
      <a href="/" class="logo"><span class="logo-icon">✦</span> AI Developer Hub</a>
      <div class="nav-links">
        <a href="/" data-i18n="nav_home">Home</a>
        <a href="/learn/" data-i18n="nav_learn">Learn</a>
        <a href="/editor/" data-i18n="nav_editor">Editor</a>
        <a href="/chat/" data-i18n="nav_chat">Chat</a>
        <a href="/tools/" data-i18n="nav_tools">Tools</a>
        <select id="langSelect" onchange="setLang(this.value)">
          <option value="ko">🇰🇷 한국어</option>
          <option value="en">🇺🇸 English</option>
          <option value="ja">🇯🇵 日本語</option>
        </select>
        <a href="/login/" id="navAuth" data-i18n="nav_signin">Sign In</a>
      </div>
    </div>
  </nav>

  <main class="auth-page">
    <div class="auth-card">
      <h2>Create Account</h2>
      <p style="text-align:center;color:var(--text-muted);font-size:.88rem;margin-bottom:20px">Start your AI learning journey</p>
      <div class="error" id="error"></div>
      <input type="text" id="name" placeholder="Name (optional)">
      <input type="email" id="email" placeholder="Email" autocomplete="email">
      <input type="password" id="password" placeholder="Password (min 4 chars)" autocomplete="new-password">
      <button class="btn btn-primary" onclick="register()">Create Account</button>
      <div class="auth-link">Already have an account? <a href="/login/">Sign In</a></div>
    </div>
  </main>

  <footer><p data-i18n="footer_right">© 2026 AI Developer Hub</p></footer>

  <script>
    async function register() {
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errEl = document.getElementById('error');
      errEl.textContent = '';
      if (password.length < 4) { errEl.textContent = 'Password must be at least 4 characters'; return; }
      try {
        const res = await fetch('/api/auth', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body:JSON.stringify({action:'register',email,password,name})
        });
        const data = await res.json();
        if (data.error) { errEl.textContent = data.error; return; }
        localStorage.setItem('fcc_token', data.token);
        localStorage.setItem('fcc_user', JSON.stringify(data.user));
        window.location.href = '/profile/';
      } catch(e) { errEl.textContent = 'Connection error'; }
    }
    initLang();
  </script>
</body>
</html>
