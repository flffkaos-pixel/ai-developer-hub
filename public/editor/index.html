<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Code Editor - AI Developer Hub</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0,200" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/codemirror.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/theme/dracula.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/javascript/javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/htmlmixed/htmlmixed.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/xml/xml.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/css/css.min.js"></script>
  <style>
  .editor-layout{display:grid;grid-template-columns:400px 1fr;gap:24px;min-height:calc(100vh - 160px);max-width:1400px;margin:0 auto;padding:24px 40px}
  @media(max-width:1100px){.editor-layout{grid-template-columns:1fr;padding:16px}}
  .desc-panel{display:flex;flex-direction:column;gap:12px;max-height:calc(100vh - 160px);overflow-y:auto}
  .desc-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;line-height:1.7}
  .desc-card h2{font-family:'Hanken Grotesk',sans-serif;font-size:1.15rem;font-weight:600;margin-bottom:8px}
  .desc-card .body{font-size:.88rem;color:var(--text-secondary);line-height:1.75}
  .desc-card .body code{background:var(--surface-deep);color:var(--secondary);padding:2px 6px;border-radius:4px;font-size:.82rem;font-family:'JetBrains Mono',monospace}
  .desc-card .body pre{margin:12px 0;padding:12px;background:var(--surface-deep);border:1px solid var(--border);border-radius:var(--radius-sm);overflow-x:auto;font-size:.82rem;font-family:'JetBrains Mono',monospace}
  .desc-card .section-label{font-size:.75rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-top:16px;margin-bottom:6px}
  .desc-card .seed-block{font-family:'JetBrains Mono',monospace;font-size:.8rem;padding:12px;background:var(--surface-deep);border:1px solid var(--border);border-radius:var(--radius-sm);overflow-x:auto;line-height:1.4;color:var(--terminal)}
  .desc-card .test-item{font-family:'JetBrains Mono',monospace;font-size:.78rem;padding:6px 10px;margin-bottom:4px;background:var(--surface-deep);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-muted)}
  .desc-actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px}
  .desc-actions .actn{padding:6px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);font-size:.8rem;cursor:pointer;transition:var(--transition);background:var(--surface);color:var(--text-secondary);display:inline-flex;align-items:center;gap:4px;text-decoration:none}
  .desc-actions .actn:hover{background:var(--surface-hover);border-color:var(--primary);color:var(--text)}
  .code-panel{display:flex;flex-direction:column;gap:12px;min-height:calc(100vh - 160px)}
  .toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .toolbar .label{color:var(--text-muted);font-size:.8rem;flex:1}
  .CodeMirror{height:380px;border-radius:var(--radius-sm);border:1px solid var(--border);font-size:14px}
  .CodeMirror-gutters{background:var(--surface)!important;border-right:1px solid var(--border)!important}
  .CodeMirror-linenumber{color:var(--text-muted)!important}
  .cm-s-dracula.CodeMirror{background:var(--surface)!important}
  .cm-s-dracula .CodeMirror-cursor{border-color:var(--primary)!important}
  .preview-frame{background:#fff;border-radius:var(--radius-sm);border:1px solid var(--border);width:100%;height:380px}
  .test-results{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;flex:1;overflow-y:auto;font-size:.82rem;min-height:80px;max-height:180px}
  .test-item{padding:4px 0;border-bottom:1px solid rgba(26,26,46,.5);display:flex;gap:6px;align-items:flex-start;font-size:.8rem;color:var(--text-secondary)}
  .test-pass{color:var(--success)}
  .test-fail{color:var(--error)}
  .all-pass{color:var(--success);font-weight:600;margin-top:8px}
  @media(max-width:1100px){
    .desc-panel{max-height:none;overflow-y:visible}
    .code-panel{min-height:auto}
    .CodeMirror{height:280px}
    .preview-frame{height:280px}
    .test-results{max-height:140px}
  }
  </style>
  <script src="/lang.js"></script>
  <script src="/data/curriculum.js"></script>
</head>
<body>
  <nav>
    <div class="nav-inner">
      <a href="/" class="logo"><span class="logo-icon">✦</span> AI Developer Hub</a>
      <div class="nav-links">
        <a href="/" data-i18n="nav_home">Home</a>
        <a href="/learn/" data-i18n="nav_learn">Learn</a>
        <a href="/editor/" class="active" data-i18n="nav_editor">Editor</a>
        <a href="/chat/" class="hide-mobile" data-i18n="nav_chat">Chat</a>
        <a href="/tools/" class="hide-mobile" data-i18n="nav_tools">Tools</a>
        <select id="langSelect" onchange="setLang(this.value)">
          <option value="ko">🇰🇷 한국어</option>
          <option value="en">🇺🇸 English</option>
          <option value="ja">🇯🇵 日本語</option>
        </select>
        <a href="/login/" id="navAuth" data-i18n="nav_signin">Sign In</a>
      </div>
    </div>
  </nav>

  <main style="padding-top:72px">
    <div class="editor-layout">
      <div class="desc-panel" id="descPanel">
        <div class="desc-card">
          <div id="descContent" style="color:var(--text-muted);font-size:.9rem">Loading challenge...</div>
        </div>
      </div>
      <div class="code-panel">
        <div class="toolbar">
          <span class="material-symbols-outlined" style="font-size:1.1rem;color:var(--text-muted)">code</span>
          <span class="label" id="langLabel">JavaScript</span>
          <button class="btn btn-sm btn-ghost" id="resetBtn"><span class="material-symbols-outlined" style="font-size:1rem">refresh</span> <span data-i18n="editor_reset">Reset</span></button>
        </div>
        <textarea id="codeEditor"></textarea>
        <div class="toolbar" style="margin-top:4px">
          <span class="material-symbols-outlined" style="font-size:1.1rem;color:var(--text-muted)">play_arrow</span>
          <span class="label" data-i18n="editor_preview">Preview & Tests</span>
          <button class="btn btn-sm btn-primary" id="runBtn"><span data-i18n="editor_run">▶ Run Tests</span></button>
          <button class="btn btn-sm" id="submitBtn" data-i18n="editor_submit">
            <span class="material-symbols-outlined" style="font-size:1rem">check_circle</span> Submit
          </button>
        </div>
        <iframe id="preview" class="preview-frame" sandbox="allow-scripts"></iframe>
        <div class="test-results" id="testResults">
          <div style="color:var(--text-muted)" data-i18n="editor_run_hint">Click "Run Tests" to check your solution.</div>
        </div>
      </div>
    </div>
  </main>

  <script>
  const DEMO_CHALLENGES = {
    'html-intro': {
      title: 'Say Hello to HTML',
      dashedName: 'say-hello-to-html',
      description: 'Create an h1 element with the text "Hello World" inside it.',
      seed: '<h1>Hello</h1>',
      tests: ['assert.exists(document.querySelector("h1"));', 'assert.match(code, /hello/i);']
    },
    'js-variables': {
      title: 'JavaScript Variables',
      dashedName: 'js-variables',
      description: 'Declare a variable named **name** and assign it the value `"AI Developer"`.',
      seed: '// Declare your variable here',
      tests: ['assert.exists(name);', 'assert.strictEqual(name, "AI Developer");']
    },
    'js-function': {
      title: 'Create a Function',
      dashedName: 'js-function',
      description: 'Create a function named **add** that takes two parameters and returns their sum.',
      seed: '// Write your function here',
      tests: ['assert.exists(add);', 'assert.strictEqual(add(2,3), 5);', 'assert.strictEqual(add(-1,1), 0);']
    },
    'css-style': {
      title: 'Style with CSS',
      dashedName: 'css-style',
      description: 'Set the color of all **h1** elements to **blue**.',
      seed: '<style>\n  /* Write your CSS here */\n</style>\n<h1>Hello World</h1>',
      tests: ['assert.match(code, /color\\s*:\\s*blue/i);', "assert.strictEqual(window.getComputedStyle(document.querySelector('h1')).color, 'rgb(0, 0, 255)');"]
    }
  };

  let editor, currentChallenge, sbName, blockName, challengeIdx;
  let curTranslations = window.__curriculum?.translations || {};
  function tr(name) { return curTranslations[name] || name.replace(/-/g, ' '); }

  function html(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
  function md(s){
    if(!s)return'';
    return s.replace(/<script[\s\S]*?<\/script>/gi,'')
            .replace(/`([^`]+)`/g,'<code>$1</code>')
            .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
            .replace(/\n/g,'<br>')
  }

  document.addEventListener('DOMContentLoaded',function(){
    const p=new URLSearchParams(location.search);
    sbName=p.get('sb');blockName=p.get('block');challengeIdx=parseInt(p.get('idx'))||0;
    if(sbName&&blockName)loadChallenge(sbName,blockName,challengeIdx);
    else showDemoList();
  });

  function showDemoList() {
    const keys = Object.keys(DEMO_CHALLENGES);
    document.getElementById('descContent').innerHTML =
      '<h2>' + __('editor_title') + '</h2>' +
      '<div class="body">' + __('editor_choose') + '</div>' +
      '<div class="section-label">' + __('editor_demos') + '</div>' +
      keys.map(k => `<div class="test-item" onclick="loadDemo('${k}')" style="cursor:pointer">▶ ${DEMO_CHALLENGES[k].title}</div>`).join('');
    setupDefaultEditor();
  }

  function loadDemo(key) {
    const ch = DEMO_CHALLENGES[key];
    if (!ch) return;
    currentChallenge = ch;
    renderChallenge(ch);
  }

  function renderChallenge(ch) {
    const tests = Array.isArray(ch.tests) ? ch.tests : [];
    const sbLabel = sbName ? tr(sbName) : '';
    const blLabel = blockName ? tr(blockName) : '';
    document.getElementById('descContent').innerHTML =
      (sbLabel ? '<div style="font-size:.75rem;color:var(--text-muted);margin-bottom:2px">' + sbLabel + ' › ' + blLabel + '</div>' : '') +
      '<h2>' + html(ch.title) + '</h2>' +
      '<div class="body" id="descBody">' + (ch.description ? md(ch.description) : '') + '</div>' +
      (ch.seed ? '<div class="section-label">' + __('editor_seed') + '</div><div class="seed-block">' + html(ch.seed) + '</div>' : '') +
      (tests.length ? '<div class="section-label">' + __('editor_tests') + ' (' + tests.length + ')</div>' + tests.map(t => '<div class="test-item">' + html(t) + '</div>').join('') : '') +
      '<div class="desc-actions">' +
        '<a href="/learn/" class="actn"><span class="material-symbols-outlined" style="font-size:1rem">arrow_back</span> ' + __('editor_back') + '</a>' +
        '<a href="/editor/" class="actn"><span class="material-symbols-outlined" style="font-size:1rem">list</span> ' + __('editor_list') + '</a>' +
      '</div>' +
      '<div style="font-size:.72rem;color:var(--text-muted);margin-top:8px" data-i18n="editor_content_note">Content: English (original) / 한국어 / 日本語</div>';

    let code = ch.seed || '';
    let mode = 'javascript';
    if (!code) { code = ch.dashedName && ch.dashedName.includes('html') ? '<!DOCTYPE html>\n<html>\n<head>\n  <title></title>\n</head>\n<body>\n\n</body>\n</html>' : '// write your code'; }
    if (code.includes('<html') || code.includes('<!DOCTYPE') || code.includes('<body')) mode = 'htmlmixed';
    document.getElementById('langLabel').textContent = mode === 'htmlmixed' ? 'HTML' : 'JavaScript';

    if (editor) editor.toTextArea();
    editor = CodeMirror.fromTextArea(document.getElementById('codeEditor'), {
      value: code, mode: mode, theme: 'dracula', lineNumbers: true,
      autoCloseBrackets: true, indentUnit: 2, tabSize: 2, lineWrapping: true
    });
    editor.setValue(code);
    document.getElementById('submitBtn').disabled = false;
    document.getElementById('submitBtn').textContent = '✔ ' + __('editor_submit');
    document.getElementById('testResults').innerHTML = '<div style="color:var(--text-muted)">' + __('editor_run_hint') + '</div>';
    document.getElementById('preview').srcdoc = '';
    var curLang = document.getElementById('langSelect')?.value || localStorage.getItem('fcc_lang') || 'ko';
    if(curLang !== 'en') setTimeout(function(){ translateDesc(curLang); }, 300);
  }

  function setupDefaultEditor() {
    const code = '// Write your code here\nfunction greet(name) {\n  return "Hello, " + name + "!";\n}\n\nconsole.log(greet("World"));';
    if (editor) editor.toTextArea();
    editor = CodeMirror.fromTextArea(document.getElementById('codeEditor'), {
      value: code, mode: 'javascript', theme: 'dracula', lineNumbers: true,
      autoCloseBrackets: true, indentUnit: 2, tabSize: 2, lineWrapping: true
    });
  }

  async function loadChallenge(sb, blk, idx) {
    document.getElementById('descContent').innerHTML = '<div class="loading">⏳ ' + __('editor_loading') + '</div>';
    try {
      const res = await fetch('/data/sb-' + sb + '.json');
      const data = await res.json();
      const block = data.blocks.find(b => b.name === blk);
      if (!block || !block.challenges[idx]) throw new Error('Challenge not found');
      currentChallenge = block.challenges[idx];
      renderChallenge(currentChallenge);
    } catch(e) {
      document.getElementById('descContent').innerHTML =
        '<h2>' + __('editor_need_connect') + '</h2>' +
        '<div class="body">' + __('editor_connect_desc') + '</div>' +
        '<div class="section-label">' + __('editor_demos') + '</div>' +
        Object.keys(DEMO_CHALLENGES).map(k => `<div class="test-item" onclick="loadDemo('${k}')" style="cursor:pointer">▶ ${DEMO_CHALLENGES[k].title}</div>`).join('') +
        '<div class="desc-actions"><a href="/learn/" class="actn">← ' + __('nav_learn') + '</a></div>';
      setupDefaultEditor();
    }
  }

  const ASSERT_POLYFILL = 'window.__results=[];window.__idx=0;window.assert={_pass:function(m){window.__results.push({pass:true,msg:m});},_fail:function(m){window.__results.push({pass:false,msg:m});},isTrue:function(v,m){var i=++window.__idx;v?this._pass(m||"#"+i+": ok"):this._fail(m||"#"+i+": expected true, got "+v);},isFalse:function(v,m){var i=++window.__idx;!v?this._pass(m||"#"+i+": ok"):this._fail(m||"#"+i+": expected false");},equal:function(a,b,m){var i=++window.__idx;a==b?this._pass(m||"#"+i+": ok"):this._fail(m||"#"+i+": expected "+b+", got "+a);},notEqual:function(a,b,m){var i=++window.__idx;a!=b?this._pass(m||"#"+i+": ok"):this._fail(m||"#"+i+": should not equal "+b);},strictEqual:function(a,b,m){var i=++window.__idx;a===b?this._pass(m||"#"+i+": ok"):this._fail(m||"#"+i+": expected === "+b+", got "+a);},exists:function(v,m){var i=++window.__idx;v!=null?this._pass(m||"#"+i+": ok"):this._fail(m||"#"+i+": expected value to exist");},isArray:function(v,m){var i=++window.__idx;Array.isArray(v)?this._pass(m||"#"+i+": ok"):this._fail(m||"#"+i+": expected array");},match:function(s,r,m){var i=++window.__idx;r.test(s)?this._pass(m||"#"+i+": ok"):this._fail(m||"#"+i+": expected match");},include:function(a,v,m){var i=++window.__idx;typeof a.indexOf==="function"&&a.indexOf(v)>-1?this._pass(m||"#"+i+": ok"):this._fail(m||"#"+i+":"+v+" not in array");},throws:function(f,m){var i=++window.__idx;try{f();this._fail(m||"#"+i+": expected throw");}catch(e){this._pass(m||"#"+i+": ok");}},typeOf:function(v,t,m){var i=++window.__idx;typeof v===t?this._pass(m||"#"+i+": ok"):this._fail(m||"#"+i+": expected "+t+", got "+typeof v);},fail:function(m){window.__results.push({pass:false,msg:"ASSERT FAIL: "+m});}};';

  function runTests() {
    if (!currentChallenge || !currentChallenge.tests || !currentChallenge.tests.length) {
      document.getElementById('testResults').innerHTML = '<div style="color:var(--text-muted)">' + __('editor_no_tests') + '</div>';
      return;
    }
    const code = editor.getValue();
    const isHtml = /<html|<\!DOCTYPE|<body|<div|<h[1-6]|<p|<span/i.test(code);
    const resultsEl = document.getElementById('testResults');
    const preview = document.getElementById('preview');
    resultsEl.innerHTML = '<div style="color:var(--warning)">⏳ ' + __('editor_test_running') + '</div>';

    const testScript = currentChallenge.tests.map(t => 'try {' + t + '}catch(e){assert.fail(e.message);}').join('\n');
    const postMsg = 'window.parent.postMessage({type:"test-results",results:window.__results||[]},"*");';
    const fullScript = ASSERT_POLYFILL + '\n' + testScript + '\n' + postMsg;

    if (isHtml) {
      const cl = '<\/script>';
      const wrapped = code.replace('</body>', '<script>' + fullScript + cl + '\n</body>');
      preview.srcdoc = wrapped.includes('</body>') ? wrapped : code + '<script>' + fullScript + cl;
    } else {
      const cl = '<\/script>';
      preview.srcdoc = '<!DOCTYPE html><html><head><script>' + fullScript + cl + '</head><body></body></html>';
    }
  }

  window.addEventListener('message', function(e) {
    if (e.data.type === 'test-results') {
      const results = e.data.results || [];
      const resultsEl = document.getElementById('testResults');
      const passed = results.filter(r => r.pass);
      const failed = results.filter(r => !r.pass);
      const passCount = passed.length;
      const total = results.length;

      resultsEl.innerHTML = results.map((r, i) =>
        '<div class="test-item"><span class="' + (r.pass ? 'test-pass' : 'test-fail') + '">' + (r.pass ? '✓' : '✗') + '</span><span>' + (r.msg || '') + '</span></div>'
      ).join('');

      if (passCount === total && total > 0) {
        resultsEl.innerHTML += '<div class="all-pass">✓ ' + __('editor_all_pass') + '</div>';
      } else {
        resultsEl.innerHTML += '<div style="color:var(--warning);margin-top:.4rem">' + passCount + '/' + total + ' passed</div>';
      }
    }
  });

  function resetCode() {
    if (currentChallenge) {
      editor.setValue(currentChallenge.seed || '');
      document.getElementById('testResults').innerHTML = '<div style="color:var(--text-muted)">' + __('editor_reset_hint') + '</div>';
      document.getElementById('preview').srcdoc = '';
    }
  }

  var _transCache = JSON.parse(localStorage.getItem('transCache') || '{}');
  function translateDesc(lang){
    if(lang === 'en' || !currentChallenge) return;
    var body = document.getElementById('descBody');
    if(!body) return;
    var key = (currentChallenge.id || currentChallenge.dashedName) + '_' + lang;
    if(_transCache[key]){ body.innerHTML = _transCache[key]; return; }
    var text = currentChallenge.description || '';
    if(!text || text.length < 10) return;
    var pair = 'en|' + (lang === 'ko' ? 'ko' : 'ja');
    fetch('https://api.mymemory.translated.net/get?q=' + encodeURIComponent(text.slice(0,500)) + '&langpair=' + pair)
    .then(function(r){ return r.json(); })
    .then(function(d){
      if(d && d.responseData && d.responseData.translatedText){
        var t = d.responseData.translatedText;
        body.innerHTML = md(t);
        _transCache[key] = t;
        localStorage.setItem('transCache', JSON.stringify(_transCache));
      }
    }).catch(function(){});
  }

  function doneChallenge() {
    const id = currentChallenge?.id || currentChallenge?.dashedName;
    if (!id) return;
    const completed = JSON.parse(localStorage.getItem('learnCompleted') || '{}');
    completed[id] = true;
    localStorage.setItem('learnCompleted', JSON.stringify(completed));
    const btn = document.getElementById('submitBtn');
    btn.textContent = '✅ ' + __('editor_completed');
    btn.disabled = true;
  }

  var _origSetLang = window.setLang;
  window.setLang = function(lang){
    _origSetLang(lang);
    translateDesc(lang);
  };
  document.getElementById('submitBtn').addEventListener('click', doneChallenge);
  document.getElementById('resetBtn').addEventListener('click', resetCode);
  document.getElementById('runBtn').addEventListener('click', runTests);
  initLang();
  (function() {
    const u = JSON.parse(localStorage.getItem('fcc_user') || 'null');
    const a = document.getElementById('navAuth');
    if (u) { a.textContent = u.name || u.email || 'Profile'; a.href = '/profile/'; }
  })();
  </script>
  <footer><p data-i18n="footer_right">© 2026 AI Developer Hub</p></footer>
</body>
</html>
