<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Developer Hub - 학습</title>
<link rel="stylesheet" href="/style.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0,200" />
<script src="/data/curriculum.js"></script>
<style>
.cat-header{display:flex;align-items:center;gap:10px;padding:14px 18px;border-radius:var(--radius);background:var(--surface);border:1px solid var(--border);cursor:pointer;transition:var(--transition);margin-bottom:6px;user-select:none}
.cat-header:hover{border-color:var(--primary);background:var(--surface-hover)}
.cat-header .arrow{transition:transform .3s;font-size:1.1rem;color:var(--text-muted)}
.cat-header.open .arrow{transform:rotate(90deg)}
.cat-header .cat-name{font-family:'Hanken Grotesk',sans-serif;font-size:.95rem;font-weight:600;flex:1}
.cat-header .cat-meta{font-size:.78rem;color:var(--text-muted)}
.sb-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:6px;margin-bottom:20px}
.sb-card,.card-hover{padding:16px;border-radius:var(--radius);background:var(--surface);border:1px solid var(--border);cursor:pointer;transition:var(--transition)}
.sb-card:hover,.card-hover:hover{transform:translateY(-2px);border-color:var(--primary);box-shadow:0 12px 24px -8px rgba(99,102,241,0.12)}
.sb-card h3{font-family:'Hanken Grotesk',sans-serif;font-size:.9rem;margin-bottom:3px}
.sb-card .meta{font-size:.75rem;color:var(--text-muted)}
.search-box{position:relative;max-width:500px;margin-bottom:24px}
.search-box input{width:100%;padding:10px 16px 10px 36px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:.9rem}
.search-box input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-bg)}
.search-box .ico{position:absolute;left:12px;top:10px;color:var(--text-muted);font-size:1.2rem}
.detail{padding:24px;border-radius:var(--radius-lg);background:var(--surface);border:1px solid var(--border)}
.block-row,.challenge-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);cursor:pointer;transition:var(--transition);text-decoration:none;color:inherit;margin-bottom:4px}
.block-row:hover,.challenge-row:hover{border-color:var(--primary);background:var(--surface-hover)}
.block-row .flex,.challenge-row .flex{flex:1}
.block-row .name,.challenge-row .name{font-size:.88rem;font-weight:500}
.block-row .sub,.challenge-row .sub{font-size:.75rem;color:var(--text-muted)}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;display:inline-block}
.dot.some{background:var(--primary)}
.dot.all{background:var(--success)}
.dot.none{background:var(--border-solid)}
.back{display:inline-flex;align-items:center;gap:4px;color:var(--text-muted);cursor:pointer;font-size:.85rem;margin-bottom:16px;transition:var(--transition)}
.back:hover{color:var(--primary)}
.loading{text-align:center;padding:60px 20px;color:var(--text-muted)}
@media(max-width:600px){.sb-grid{grid-template-columns:1fr}}
</style>
<script src="/lang.js"></script>
</head>
<body>
<nav>
  <div class="nav-inner">
    <a href="/" class="logo"><span class="logo-icon">✦</span> AI Developer Hub</a>
    <div class="nav-links">
      <a href="/" data-i18n="nav_home">Home</a>
      <a href="/learn/" class="active" data-i18n="nav_learn">Learn</a>
      <a href="/editor/" data-i18n="nav_editor">Editor</a>
      <a href="/chat/" class="hide-mobile" data-i18n="nav_chat">Chat</a>
      <a href="/tools/" class="hide-mobile" data-i18n="nav_tools">Tools</a>
      <select id="langSelect" onchange="setLang(this.value)">
        <option value="ko">🇰🇷 한국어</option>
        <option value="en">🇺🇸 English</option>
        <option value="ja">🇯🇵 日本語</option>
      </select>
      <a href="/login/" id="navAuth" data-i18n="nav_signin">Sign In</a>
    </div>
  </div>
</nav>

<main class="container">
  <div class="breadcrumb">
    <a href="/">Home</a><span class="sep">›</span><span id="bcLabel" class="current" data-i18n="nav_learn">Learn</span>
  </div>

  <div id="mainView">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;margin-bottom:4px">
      <div>
        <h1 style="margin-bottom:4px" data-i18n="learn_title">커리큘럼</h1>
        <p style="color:var(--text-secondary);font-size:.9rem" data-i18n="learn_desc">freeCodeCamp 기반 · 80+ 과목 · 20,000+ 챌린지</p>
      </div>
      <div id="totalPct" style="font-size:.82rem;color:var(--text-muted)" data-i18n="learn_progress"></div>
    </div>
    <div class="search-box">
      <span class="material-symbols-outlined ico">search</span>
      <input type="text" id="searchInput" placeholder="과목 검색..." data-i18n="learn_search" oninput="filterSubjects()">
    </div>
    <div id="catGrid"></div>
    <div class="sb-grid" id="sbGrid" style="display:none"></div>
  </div>

  <div id="detailView" style="display:none">
    <div class="back" onclick="showMain()">
      <span class="material-symbols-outlined" style="font-size:1.1rem">arrow_back</span>
      <span data-i18n="learn_all">모든 과목</span>
    </div>
    <div class="detail" id="detailContent"><div class="loading" data-i18n="learn_loading">⏳ 로딩 중...</div></div>
  </div>

  <div id="challengeView" style="display:none">
    <div class="back" id="backToBlocks">
      <span class="material-symbols-outlined" style="font-size:1.1rem">arrow_back</span>
      <span id="backLabel">블록 목록</span>
    </div>
    <div class="detail" id="challengeContent"><div class="loading" data-i18n="learn_loading">⏳ 로딩 중...</div></div>
  </div>
</main>

<footer><p data-i18n="footer_right">© 2026 AI Developer Hub</p></footer>

<script>
let completed = JSON.parse(localStorage.getItem('learnCompleted') || '{}');
let subjects = window.__curriculum?.subjects || [];
let translations = window.__curriculum?.translations || {};
let categories = window.__curriculum?.categories || [];
let subjectCat = window.__curriculum?.subjectCategory || {};
let activeSubject = null;
let activeBlockData = null;

function t(name) { return translations[name] || name.replace(/-/g, ' '); }
function catLang(){ return localStorage.getItem('fcc_lang') || 'ko'; }
function ct(cat){
  var idx = catLang() === 'ko' ? 0 : catLang() === 'en' ? 1 : 2;
  return (cat.names && cat.names[idx]) || cat.id;
}

function renderAll() {
  document.getElementById('totalPct').textContent = Object.keys(completed).length + (window.__ || t)('learn_progress');
  var q = document.getElementById('searchInput').value.toLowerCase();
  if(q){
    document.getElementById('catGrid').innerHTML = '';
    document.getElementById('sbGrid').style.display = 'grid';
    document.getElementById('sbGrid').innerHTML = subjects
      .filter(function(sb){ return t(sb.n).toLowerCase().indexOf(q) > -1; })
      .map(function(sb){ return '<div class="sb-card" onclick="openSubject(\'' + sb.n + '\')">' +
        '<h3>' + t(sb.n) + '</h3>' +
        '<div class="meta">' + sb.t.toLocaleString() + '개 챌린지 · ' + sb.b.length + '개 블록</div>' +
      '</div>'; }).join('') || '<p style="color:var(--text-muted);padding:20px">' + (window.__ || t)('learn_no_subjects') + '</p>';
    return;
  }
  document.getElementById('sbGrid').style.display = 'none';
  var icons = ['📐','⚡','🎨','🔧','🐍','🤖','🗄️','💡','🛠️'];
  document.getElementById('catGrid').innerHTML = categories.map(function(cat, i){
    var subs = subjects.filter(function(s){ return subjectCat[s.n] === cat.id; });
    var icon = icons[i] || '📁';
    var totalC = subs.reduce(function(a,s){ return a + (s.t||0); },0);
    return '<div class="cat-header" onclick="toggleCat(this)"><span class="arrow">▶</span>' +
      '<span class="cat-name">' + icon + ' ' + ct(cat) + '</span>' +
      '<span class="cat-meta">' + subs.length + (window.__ || t)('learn_subjects') + ' · ' + totalC.toLocaleString() + (window.__ || t)('learn_challenges') + '</span></div>' +
      '<div class="sb-grid" style="display:none">' +
      subs.map(function(sb){ return '<div class="sb-card" onclick="openSubject(\'' + sb.n + '\')">' +
        '<h3>' + t(sb.n) + '</h3>' +
        '<div class="meta">' + sb.t.toLocaleString() + (window.__ || t)('learn_challenges') + ' · ' + sb.b.length + (window.__ || t)('learn_blocks') + '</div></div>'; }).join('') +
      '</div>';
  }).join('');
}

function toggleCat(el){
  el.classList.toggle('open');
  var next = el.nextElementSibling;
  if(next && next.classList.contains('sb-grid')) next.style.display = next.style.display === 'none' ? 'grid' : 'none';
}

function filterSubjects() { renderAll(); }

async function openSubject(name) {
  activeSubject = name;
  document.getElementById('mainView').style.display = 'none';
  document.getElementById('detailView').style.display = 'block';
  document.getElementById('challengeView').style.display = 'none';
  document.getElementById('bcLabel').textContent = t(name);
  document.getElementById('detailContent').innerHTML = '<div class="loading" data-i18n="learn_loading">⏳ 로딩 중...</div>';

  try {
    const res = await fetch('/data/sb-' + name + '.json');
    const data = await res.json();
    renderDetail(name, data.blocks || []);
  } catch {
    const sb = subjects.find(s => s.n === name);
    renderDetail(name, sb ? sb.b.map(b => ({ name: b.n, challenges: [], count: b.c })) : []);
  }
}

function renderDetail(name, blocks) {
  let totalDone = 0, totalAll = 0;
  const list = blocks.map(b => {
    const challenges = b.challenges || [];
    let done = 0;
    challenges.forEach(c => { totalAll++; if (completed[c.id] || completed[c.dashedName]) done++; });
    const cnt = challenges.length || b.count || 0;
    if (!challenges.length) totalAll += cnt;
    totalDone += done;
    const status = done === cnt && cnt > 0 ? 'all' : done > 0 ? 'some' : 'none';
      return '<div class="block-row" onclick="openBlock(\'' + name + '\',\'' + b.name.replace(/'/g,"\\'") + '\')">' +
      '<span class="dot ' + status + '"></span>' +
      '<div class="flex">' +
        '<div class="name">' + t(b.name) + '</div>' +
        '<div class="sub">' + cnt + '개 챌린지' + (done > 0 ? ' · ' + done + ' 완료' : '') + '</div>' +
      '</div>' +
      '<span class="material-symbols-outlined" style="color:var(--text-muted);font-size:1.1rem">chevron_right</span>' +
    '</div>';
  }).join('');

  const pct = totalAll ? Math.round(totalDone/totalAll*100) : 0;
  document.getElementById('detailContent').innerHTML =
    '<h2 style="margin-bottom:4px">' + t(name) + '</h2>' +
    '<div style="font-size:.82rem;color:var(--text-muted);margin-bottom:16px">' + blocks.length + '개 블록 · ' + totalAll.toLocaleString() + '개 챌린지</div>' +
    '<div style="margin-bottom:16px">' +
      '<div style="height:4px;background:var(--border);border-radius:4px;overflow:hidden">' +
        '<div style="height:100%;width:' + pct + '%;background:linear-gradient(90deg,var(--primary),var(--secondary));border-radius:4px"></div>' +
      '</div>' +
      '<div style="font-size:.78rem;color:var(--text-muted);margin-top:4px">' + totalDone + '/' + totalAll + ' 완료 (' + pct + '%)</div>' +
    '</div><div>' + list + '</div>';
}

async function openBlock(sbName, blockName) {
  document.getElementById('detailView').style.display = 'none';
  document.getElementById('challengeView').style.display = 'block';
  document.getElementById('bcLabel').textContent = t(sbName) + ' › ' + t(blockName);
  document.getElementById('backLabel').textContent = t(sbName);
  document.getElementById('backToBlocks').onclick = function(){ showBlocks(sbName); };
  document.getElementById('challengeContent').innerHTML = '<div class="loading" data-i18n="learn_loading">⏳ 로딩 중...</div>';

  try {
    const res = await fetch('/data/sb-' + sbName + '.json');
    const data = await res.json();
    const block = data.blocks.find(b => b.name === blockName);
    if (block && block.challenges) {
      activeBlockData = block.challenges;
      renderChallenges(block.challenges, sbName, blockName);
      return;
    }
  } catch(e) {}
  document.getElementById('challengeContent').innerHTML = '<p style="color:var(--text-muted)" data-i18n="learn_no_challenges">챌린지 목록을 불러올 수 없습니다.</p>';
}

function renderChallenges(challenges, sbName, blockName) {
  let done = 0, total = challenges.length;
  const list = challenges.map((c, i) => {
    const isDone = completed[c.id] || completed[c.dashedName];
    if (isDone) done++;
    return '<a href="/editor/?sb=' + sbName + '&block=' + blockName + '&idx=' + i + '" class="challenge-row">' +
      '<span class="dot ' + (isDone ? 'all' : 'none') + '" style="display:inline-block"></span>' +
      '<div class="flex"><div class="name">' + (c.title || 'Step ' + (i+1)) + '</div>' +
      '<div class="sub">' + (c.dashedName || '') + (isDone ? ' · 완료' : '') + '</div></div>' +
      '<span class="material-symbols-outlined" style="color:var(--text-muted);font-size:1.1rem">chevron_right</span>' +
    '</a>';
  }).join('');

  document.getElementById('challengeContent').innerHTML =
    '<h2 style="margin-bottom:4px">' + t(blockName) + '</h2>' +
    '<div style="font-size:.82rem;color:var(--text-muted);margin-bottom:16px">' + total + '개 챌린지' + (done > 0 ? ' · ' + done + ' 완료' : '') + '</div>' +
    '<div>' + list + '</div>';
}

function showBlocks(sbName) {
  document.getElementById('detailView').style.display = 'block';
  document.getElementById('challengeView').style.display = 'none';
  document.getElementById('bcLabel').textContent = t(sbName);
}

function showMain() {
  document.getElementById('mainView').style.display = 'block';
  document.getElementById('detailView').style.display = 'none';
  document.getElementById('challengeView').style.display = 'none';
  document.getElementById('bcLabel').textContent = 'Learn';
}

(function(){
  const u = JSON.parse(localStorage.getItem('fcc_user') || 'null');
  const a = document.getElementById('navAuth');
  if(u){ a.textContent = u.name || u.email || 'Profile'; a.href = '/profile/'; }
})();

initLang();
renderAll();
</script>
</body>
</html>
