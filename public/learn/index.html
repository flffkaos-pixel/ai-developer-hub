<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Curriculum - AI Developer Hub</title>
  <link rel="stylesheet" href="/style.css">
  <script defer src="/nav-auth.js"></script>
  <style>
  .page-header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.75rem;margin-bottom:1.5rem}
  .lang-toggle{display:flex;gap:.25rem;background:var(--surface);padding:3px;border-radius:var(--radius-sm);border:1px solid var(--border)}
  .lang-btn{padding:.35rem .9rem;border:none;border-radius:4px;background:transparent;color:var(--text-secondary);cursor:pointer;font-size:.82rem;transition:var(--transition)}
  .lang-btn.active{background:var(--accent);color:#fff}
  .lang-btn:not(.active):hover{color:var(--text)}
  .sb-grid{animation:fadeIn .25s ease}
  .sb-card{position:relative;overflow:hidden}
  .sb-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent);opacity:0;transition:var(--transition)}
  .sb-card:hover::before{opacity:1}
  .sb-card h3{font-size:1rem;font-weight:600;margin-bottom:.2rem}
  .sb-card .en-name{color:var(--text-muted);font-size:.78rem;display:none;margin-bottom:.35rem}
  .sb-card .meta .icon{font-size:.75rem}
  .lang-ko .sb-card .en-name{display:block}
  .block-grid{animation:fadeIn .2s ease}
  .block-card h4{font-size:.93rem;font-weight:500;margin-bottom:.15rem}
  .challenge-list{animation:fadeIn .2s ease}
  .challenge-item .num{color:var(--text-muted);font-size:.82rem;width:2rem;flex-shrink:0}
  .challenge-item .title{flex:1;font-size:.9rem}
  .challenge-item .ch-badge{font-size:.72rem;color:var(--text-muted)}
  .challenge-item.completed{border-left:3px solid var(--success)}
  .challenge-item.completed .title{color:var(--success)}
  .challenge-detail{animation:fadeIn .2s ease}
  .challenge-detail .back{display:inline-flex;align-items:center;gap:.35rem;color:var(--text-secondary);text-decoration:none;font-size:.85rem;margin-bottom:1rem;transition:var(--transition);cursor:pointer;background:none;border:none;padding:0}
  .challenge-detail .back:hover{color:var(--accent)}
  .challenge-detail .card{padding:1.75rem;line-height:1.75}
  .challenge-detail .card h2{font-size:1.25rem;font-weight:600;margin-bottom:1rem;display:flex;align-items:center;gap:.5rem;flex-wrap:wrap}
  .challenge-detail .card h2 .done-badge{font-size:.75rem;font-weight:400;color:var(--success);background:#22c55e18;padding:.15rem .6rem;border-radius:4px}
  .challenge-detail .card .desc{color:var(--text-secondary)}
  .challenge-detail .card .desc code{background:#1e1e38;color:var(--accent);padding:.12rem .4rem;border-radius:4px;font-size:.85rem}
  .challenge-detail .card .desc pre{background:#0b0b1a;border:1px solid var(--border);border-radius:var(--radius-sm);padding:1rem;overflow-x:auto;margin:.75rem 0}
  .challenge-detail .card .desc pre code{background:none;color:inherit;padding:0}
  .challenge-detail .card .section-title{font-size:.9rem;font-weight:600;color:var(--text-secondary);margin:1.25rem 0 .5rem;text-transform:uppercase;letter-spacing:.04em}
  .challenge-detail .card .seed-code{background:#0b0b1a;border:1px solid var(--border);border-radius:var(--radius-sm);padding:1rem;overflow-x:auto;font-family:'JetBrains Mono',monospace;font-size:.85rem;line-height:1.5}
  .challenge-detail .card .test-item{background:#0b0b1a;border:1px solid var(--border);border-radius:var(--radius-sm);padding:.6rem .85rem;margin-bottom:.35rem;font-family:'JetBrains Mono',monospace;font-size:.8rem;color:var(--text-secondary)}
  .challenge-detail .card .actions{display:flex;gap:.5rem;flex-wrap:wrap;margin-top:1.25rem}
  .challenge-detail .card .actions .btn{padding:.45rem 1.1rem;border-radius:var(--radius-sm);border:none;cursor:pointer;font-size:.85rem;transition:var(--transition);text-decoration:none;display:inline-flex;align-items:center;gap:.35rem}
  .challenge-detail .card .actions .btn-translate{background:var(--accent-bg);color:var(--accent);border:1px solid var(--accent)}
  .challenge-detail .card .actions .btn-translate:hover{background:var(--accent);color:#fff}
  .challenge-detail .card .actions .btn-complete{background:#22c55e18;color:var(--success);border:1px solid var(--success)}
  .challenge-detail .card .actions .btn-complete:hover{background:var(--success);color:#fff}
  .challenge-detail .card .actions .btn-editor{background:#3b82f618;color:#60a5fa;border:1px solid #3b82f6}
  .challenge-detail .card .actions .btn-editor:hover{background:#3b82f6;color:#fff}
  .translation-box{margin-top:1rem;padding:1rem;background:#0b0b1a;border-radius:var(--radius-sm);border-left:3px solid var(--accent);line-height:1.7;color:var(--text-secondary)}
  .complete-msg{margin-top:1rem;padding:1rem;background:#22c55e18;border:1px solid var(--success);border-radius:var(--radius-sm);font-size:.9rem}
  .auth-widget{font-size:.82rem;color:var(--text-muted)}
  .auth-widget a{color:var(--text-muted);text-decoration:none}
  .auth-widget a:hover{color:var(--accent)}
  @media(max-width:600px){
    .container{padding:1.5rem 1rem}
    .grid-sb{grid-template-columns:1fr}
    .grid-blocks{grid-template-columns:1fr}
    .page-header{flex-direction:column;align-items:stretch}
    .challenge-detail .card{padding:1.25rem}
  }
  </style>
</head>
<body>
  <nav>
    <div class="nav-inner">
      <a href="/" class="logo">AI Developer Hub</a>
      <div class="nav-links">
        <a href="/">Home</a>
        <a href="/courses">Courses</a>
        <a href="/learn" class="active">Curriculum</a>
        <a href="/chat">AI Chat</a>
        <a href="/tools">Tools</a>
        <a href="/login" id="navAuth">Login</a>
      </div>
    </div>
  </nav>

  <main class="container">
    <div class="page-header" id="pageHeader">
      <div class="lang-toggle">
        <button class="lang-btn active" data-lang="ko">한국어</button>
        <button class="lang-btn" data-lang="en">English</button>
      </div>
      <div class="auth-widget" id="authWidget">
        <a href="/login">Login</a> to track progress
      </div>
    </div>
    <div class="breadcrumb" id="breadcrumb">
      <span data-click="showSuperblocks">Curriculum</span>
    </div>
    <div id="app"><div class="skeleton skeleton-card"></div><div class="skeleton skeleton-card"></div><div class="skeleton skeleton-card"></div></div>
  </main>

  <footer>
    <p>AI Developer Hub &mdash; Curriculum from <a href="https://github.com/freeCodeCamp/freeCodeCamp">freeCodeCamp</a> (BSD-3-Clause).</p>
  </footer>

  <script>
  const $ = (s, p) => (p || document).querySelector(s);
  const $$ = (s, p) => [...(p || document).querySelectorAll(s)];
  const html = (str) => str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  const last = (a) => a[a.length - 1];

  let state = {
    index: null,
    cache: {},
    translations: {},
    lang: 'ko',
    completed: new Set(),
    user: null,
    view: [] // stack: ['superblocks'] | ['blocks', sbName] | ['challenges', sbName, blockName] | ['challenge', sbName, blockName, idx]
  };

  function t(key) {
    if (state.lang === 'ko' && state.translations.ui?.[key]) return state.translations.ui[key];
    if (state.lang === 'ko' && state.translations.superblocks?.[key]) return state.translations.superblocks[key];
    return null;
  }

  function nameDisplay(name, key) {
    if (state.lang === 'ko' && state.translations.superblocks?.[key]) return state.translations.superblocks[key];
    return name.replace(/-/g, ' ');
  }

  async function loadJSON(url) {
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status} loading ${url}`);
    return res.json();
  }

  async function loadSuperblock(name) {
    if (!state.cache[name]) state.cache[name] = loadJSON(`/data/sb-${name}.json`);
    return state.cache[name];
  }

  function md(s) {
    if (!s) return '';
    return s
      .replace(/<script[\s\S]*?<\/script>/gi, '')
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
      .replace(/\n/g, '<br>');
  }

  /* ─── Event Delegation ─── */
  document.addEventListener('click', e => {
    const action = e.target.closest('[data-click]');
    if (!action) return;
    const method = action.dataset.click;
    const args = action.dataset.args;
    if (method === 'showSuperblocks') showSuperblocks();
    else if (method === 'showBlocks') showBlocks(args);
    else if (method === 'showChallenges') { const p = args.split('|'); showChallenges(p[0], p[1]); }
    else if (method === 'showChallenge') { const p = args.split('|'); showChallenge(p[0], p[1], +p[2]); }
    else if (method === 'translateChallenge') { const p = args.split('|'); translateChallenge(p[0], p[1], +p[2]); }
    else if (method === 'completeChallenge') { const p = args.split('|'); completeChallenge(p[0], p[1], +p[2]); }
  });

  document.addEventListener('click', e => {
    const btn = e.target.closest('[data-lang]');
    if (!btn) return;
    setLang(btn.dataset.lang);
  });

  /* ─── Navigation ─── */
  function setLang(lang) {
    state.lang = lang;
    $$('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
    if (state.view.length) refresh();
  }

  function breadcrumbHTML() {
    const parts = [['Curriculum', 'showSuperblocks']];
    if (state.view[0] === 'blocks') parts.push([nameDisplay(state.view[1], state.view[1])]);
    else if (state.view[0] === 'challenges' || state.view[0] === 'challenge') {
      parts.push([nameDisplay(state.view[1], state.view[1]), `showBlocks`, state.view[1]]);
      parts.push([state.view[2].replace(/-/g, ' ')]);
      if (state.view[0] === 'challenge') parts.push(['#' + (state.view[3] + 1)]);
    }
    return parts.map((p, i) => {
      if (p[1]) return `<a data-click="${p[1]}" data-args="${p[2]||''}" style="cursor:pointer">${p[0]}</a>`;
      return `<span class="current">${p[0]}</span>`;
    }).join('<span class="sep">›</span>');
  }

  function refresh() {
    const [view, ...args] = state.view;
    if (view === 'superblocks') showSuperblocks();
    else if (view === 'blocks') showBlocks(args[0]);
    else if (view === 'challenges') showChallenges(args[0], args[1]);
    else if (view === 'challenge') showChallenge(args[0], args[1], +args[2]);
  }

  /* ─── Views ─── */
  function showSuperblocks() {
    state.view = ['superblocks'];
    $('#breadcrumb').innerHTML = breadcrumbHTML();
    const app = $('#app');
    app.innerHTML = `<div class="sb-grid">${state.index.superblocks.map(sb =>
      `<div class="sb-card" data-click="showBlocks" data-args="${html(sb.name)}">
        <h3>${html(nameDisplay(sb.name, sb.name))}</h3>
        <div class="en-name">${html(sb.name.replace(/-/g, ' '))}</div>
        <div class="meta"><span class="icon">📚</span> ${sb.blocks.length} ${t('blocks') || 'blocks'}</div>
      </div>`
    ).join('')}</div>`;
  }

  async function showBlocks(sbName) {
    state.view = ['blocks', sbName];
    $('#breadcrumb').innerHTML = breadcrumbHTML();
    const app = $('#app');
    app.innerHTML = '<div class="skeleton skeleton-card"></div>'.repeat(6);
    try {
      const sb = await loadSuperblock(sbName);
      const blocks = sb.blocks.filter(b => b.challenges.length > 0);
      app.innerHTML = `<div class="block-grid">${blocks.map(b =>
        `<div class="block-card" data-click="showChallenges" data-args="${html(sbName)}|${html(b.name)}">
          <h4>${html(b.name.replace(/-/g, ' '))}</h4>
          <div class="meta">${b.challenges.length} ${t('challenges') || 'challenges'}</div>
        </div>`
      ).join('')}</div>`;
    } catch (e) {
      app.innerHTML = `<div style="color:var(--error);padding:2rem;text-align:center">⚠️ Error loading: ${html(e.message)}</div>`;
    }
  }

  async function showChallenges(sbName, blockName) {
    state.view = ['challenges', sbName, blockName];
    $('#breadcrumb').innerHTML = breadcrumbHTML();
    const app = $('#app');
    app.innerHTML = '<div class="skeleton skeleton-card"></div>'.repeat(5);
    try {
      const sb = await loadSuperblock(sbName);
      const block = sb.blocks.find(b => b.name === blockName);
      if (!block) throw new Error('Block not found: ' + blockName);
      app.innerHTML = `<div class="challenge-list">${block.challenges.map((ch, i) =>
        `<div class="challenge-item${state.completed.has(ch.id) ? ' completed' : ''}" data-click="showChallenge" data-args="${html(sbName)}|${html(blockName)}|${i}">
          <span class="num">${state.completed.has(ch.id) ? '✅' : (i+1).toString().padStart(2,'\xa0')}</span>
          <span class="title">${html(ch.title)}</span>
          <span class="ch-badge">${ch.seed ? '💻' : ''}</span>
        </div>`
      ).join('')}</div>`;
    } catch (e) {
      app.innerHTML = `<div style="color:var(--error);padding:2rem;text-align:center">⚠️ Error loading: ${html(e.message)}</div>`;
    }
  }

  async function showChallenge(sbName, blockName, idx) {
    state.view = ['challenge', sbName, blockName, idx];
    $('#breadcrumb').innerHTML = breadcrumbHTML();
    const app = $('#app');
    app.innerHTML = '<div class="skeleton" style="height:200px"></div>';
    try {
      const sb = await loadSuperblock(sbName);
      const block = sb.blocks.find(b => b.name === blockName);
      if (!block) throw new Error('Block not found');
      const ch = block.challenges[idx];
      if (!ch) throw new Error('Challenge not found at index ' + idx);
      const complete = state.completed.has(ch.id);
      const showKo = state.lang === 'ko';
      const tests = Array.isArray(ch.tests) ? ch.tests : [];

      app.innerHTML = `<div class="challenge-detail">
        <a class="back" data-click="showChallenges" data-args="${html(sbName)}|${html(blockName)}">← ${t('back') || 'Back to list'}</a>
        <div class="card">
          <h2>${complete ? '✅ ' : ''}${html(ch.title)} ${complete ? '<span class="done-badge">Completed</span>' : ''}</h2>
          <div class="desc">${ch.description ? md(ch.description) : '<em>No description</em>'}</div>

          ${ch.seed ? `<div class="section-title">${t('seed_code') || 'Seed Code'}</div><div class="seed-code">${html(ch.seed)}</div>` : ''}

          ${tests.length ? `<div class="section-title">${t('tests') || 'Tests'}</div>${tests.map(t => `<div class="test-item">${html(t)}</div>`).join('')}` : ''}

          <div class="actions">
            ${showKo ? `<button class="btn btn-translate" data-click="translateChallenge" data-args="${html(sbName)}|${html(blockName)}|${idx}">🌐 ${t('translate') || 'Translate to Korean'}</button>` : ''}
            ${state.user && !complete ? `<button class="btn btn-complete" data-click="completeChallenge" data-args="${html(sbName)}|${html(blockName)}|${idx}">✅ Mark Complete (+10 XP)</button>` : ''}
            <a href="/editor?sb=${encodeURIComponent(sbName)}&block=${encodeURIComponent(blockName)}&idx=${idx}" class="btn btn-editor">💻 Open in Editor</a>
          </div>
          <div id="translation"></div>
          <div id="completeMsg"></div>
        </div>
      </div>`;
    } catch (e) {
      app.innerHTML = `<div style="color:var(--error);padding:2rem;text-align:center">⚠️ Error: ${html(e.message)}</div>`;
    }
  }

  /* ─── Actions ─── */
  async function completeChallenge(sbName, blockName, idx) {
    if (!state.user) return;
    try {
      const sb = await loadSuperblock(sbName);
      const block = sb.blocks.find(b => b.name === blockName);
      const ch = block.challenges[idx];
      if (!ch) return;

      const res = await fetch('/api/progress', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId: state.user.id, challengeId: ch.id, title: ch.title })
      });
      const data = await res.json();
      if (data.status === 'ok' || data.status === 'already_completed') {
        state.completed.add(ch.id);
        if (data.xpGained) {
          state.user.xp = data.totalXp || (state.user.xp + 10);
          state.user.level = data.level || state.user.level;
          localStorage.setItem('fcc_user', JSON.stringify(state.user));
        }
        let msg = '✅ Completed! +10 XP';
        if (data.leveledUp) msg += `<br>🎉 <strong>Level Up! You're now Level ${data.level}!</strong>`;
        if (data.newBadges?.length) msg += `<br>🏅 New badge${data.newBadges.length > 1 ? 's' : ''}!`;
        $('#completeMsg').innerHTML = `<div class="complete-msg">${msg}</div>`;
        showChallenge(sbName, blockName, idx);
      }
    } catch (e) {
      $('#completeMsg').innerHTML = `<div style="color:var(--error);margin-top:.5rem">Error: ${html(e.message)}</div>`;
    }
  }

  async function translateChallenge(sbName, blockName, idx) {
    const btn = event.target.closest('[data-click]');
    btn.textContent = '⏳ ' + (state.translations.ui?.translating || 'Translating...');
    btn.disabled = true;

    try {
      const sb = await loadSuperblock(sbName);
      const block = sb.blocks.find(b => b.name === blockName);
      const ch = block.challenges[idx];
      if (!ch) throw new Error('Challenge not found');

      const { CreateMLCEngine } = await import("https://esm.run/@mlc-ai/web-llm");
      const engine = await CreateMLCEngine("gemma-2-2b-it-q4f16_1-MLC", {
        initProgressCallback: (p) => {
          if (p.progress < 1) btn.textContent = `⏳ Loading AI... ${(p.progress * 100).toFixed(0)}%`;
        }
      });
      const text = `Translate this programming lesson to Korean. Keep code blocks unchanged.\n\nTitle: ${ch.title}\n\nDescription:\n${ch.description?.slice(0, 1500)}`;
      const reply = await engine.chat.completions.create({
        messages: [{ role: "user", content: text }],
        max_tokens: 1024, temperature: 0.3
      });
      $('#translation').innerHTML = `<div class="translation-box">${html(reply.choices[0].message.content).replace(/\n/g,'<br>')}</div>`;
    } catch (e) {
      const fallback = {variable:'변수',function:'함수',array:'배열',object:'객체',string:'문자열',number:'숫자',loop:'반복문',condition:'조건문',class:'클래스',value:'값',store:'저장',assign:'할당',declare:'선언',call:'호출',return:'반환',parameter:'매개변수',argument:'인수',method:'메서드',property:'속성'};
      const sb = await loadSuperblock(sbName);
      const block = sb.blocks.find(b => b.name === blockName);
      const ch = block.challenges[idx];
      let translated = ch.description || '';
      for (const [en, ko] of Object.entries(fallback)) translated = translated.replace(new RegExp(`\\b${en}\\b`, 'gi'), ko);
      $('#translation').innerHTML = `<div class="translation-box" style="border-left-color:#f59e0b"><small style="color:#f59e0b">⚠️ AI 번역 실패, 기본 번역 적용됨</small><br><br>${html(translated).replace(/\n/g,'<br>')}</div>`;
    }
    btn.textContent = '🌐 ' + (state.translations.ui?.translate || 'Translate to Korean');
    btn.disabled = false;
  }

  /* ─── Init ─── */
  async function init() {
    try {
      const [idxRes, trRes] = await Promise.all([
        loadJSON('/data/index.json'),
        loadJSON('/data/ko/translations.json').catch(() => ({}))
      ]);
      state.index = idxRes;
      state.translations = trRes || {};

      const userData = localStorage.getItem('fcc_user');
      const token = localStorage.getItem('fcc_token');
      if (token && userData) {
        state.user = JSON.parse(userData);
        $('#authWidget').innerHTML = `<span style="color:var(--success)">${html(state.user.email)}</span> · <a href="/profile">Profile</a> (Lv.${state.user.level})`;
        try {
          const res = await fetch(`/api/progress?userId=${state.user.id}`);
          if (res.ok) {
            const data = await res.json();
            (data.completed || []).forEach(c => state.completed.add(c.challenge_id));
          }
        } catch (_) {}
      }
      showSuperblocks();
    } catch (e) {
      $('#app').innerHTML = `<div style="color:var(--error);padding:2rem;text-align:center">⚠️ Failed to load curriculum: ${html(e.message)}<br><br><button onclick="location.reload()" style="padding:.5rem 1.5rem;border:none;border-radius:6px;background:var(--accent);color:#fff;cursor:pointer">Retry</button></div>`;
    }
  }
  init();
  </script>
</body>
</html>
