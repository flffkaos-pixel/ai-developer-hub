<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Curriculum - AI Developer Hub</title>
  <link rel="stylesheet" href="/style.css">
  <style>
  .lang-toggle { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
  .lang-btn { padding: 0.4rem 1rem; border-radius: 6px; border: 1px solid #2a2a4a; background: transparent; color: #a0a0c0; cursor: pointer; font-size: 0.85rem; }
  .lang-btn.active { border-color: #7c3aed; color: #7c3aed; background: #7c3aed22; }
  .breadcrumb { color: #a0a0c0; margin-bottom: 1rem; font-size: 0.9rem; }
  .breadcrumb span { cursor: pointer; }
  .breadcrumb span:hover { color: #7c3aed; }
  .sb-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }
  .sb-item { background: #12122a; border: 1px solid #2a2a4a; border-radius: 12px; padding: 1.2rem; cursor: pointer; transition: all 0.2s; }
  .sb-item:hover { border-color: #7c3aed; }
  .sb-item h3 { margin-bottom: 0.3rem; font-size: 1rem; }
  .sb-item .en-name { color: #606080; font-size: 0.8rem; display: none; }
  .sb-item .count { color: #606080; font-size: 0.85rem; }
  .block-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 0.8rem; }
  .block-item { background: #12122a; border: 1px solid #2a2a4a; border-radius: 8px; padding: 1rem; cursor: pointer; }
  .block-item:hover { border-color: #7c3aed; }
  .block-item h4 { font-size: 0.95rem; margin-bottom: 0.2rem; }
  .challenge-list { display: flex; flex-direction: column; gap: 0.5rem; }
  .challenge-item { background: #12122a; border: 1px solid #2a2a4a; border-radius: 8px; padding: 0.8rem 1rem; cursor: pointer; }
  .challenge-item:hover { border-color: #7c3aed; }
  .challenge-detail { background: #12122a; border: 1px solid #2a2a4a; border-radius: 12px; padding: 2rem; line-height: 1.8; }
  .challenge-detail h2 { margin-bottom: 1rem; }
  .challenge-detail pre { background: #1a1a2e; padding: 1rem; border-radius: 8px; overflow-x: auto; margin: 1rem 0; }
  .back-btn { background: none; border: 1px solid #2a2a4a; color: #a0a0c0; padding: 0.4rem 1rem; border-radius: 6px; cursor: pointer; margin-bottom: 1rem; }
  .back-btn:hover { border-color: #7c3aed; color: #7c3aed; }
  .loading { text-align: center; padding: 3rem; color: #606080; }
  .translate-btn { background: none; border: 1px solid #7c3aed; color: #7c3aed; padding: 0.3rem 0.8rem; border-radius: 6px; cursor: pointer; font-size: 0.8rem; margin-top: 1rem; display: inline-block; }
  .translate-btn:hover { background: #7c3aed22; }
  .ko-text { display: none; }
  .ko-text.visible { display: inline; }
  .en-text.hidden { display: none; }
  .ko-header { display: none; }
  .lang-ko .ko-header { display: block; }
  .lang-ko .en-header { display: none; }
  .lang-ko .sb-item .en-name { display: block; }
  </style>
</head>
<body>
  <nav>
    <div class="nav-inner">
      <a href="/" class="logo">AI Developer Hub</a>
      <div class="nav-links">
        <a href="/">Home</a>
        <a href="/courses">Courses</a>
        <a href="/learn" class="active">Curriculum</a>
        <a href="/chat">AI Chat</a>
        <a href="/tools">Tools</a>
      </div>
    </div>
  </nav>

  <main class="container">
    <div class="lang-toggle">
      <button class="lang-btn active" onclick="setLang('ko')" id="btnKo">한국어</button>
      <button class="lang-btn" onclick="setLang('en')" id="btnEn">English</button>
    </div>
    <div class="breadcrumb" id="breadcrumb">
      <span onclick="showSuperblocks()">Curriculum</span>
    </div>
    <div id="app"><div class="loading">Loading curriculum...</div></div>
  </main>

  <footer>
    <p>AI Developer Hub &mdash; Curriculum from <a href="https://github.com/freeCodeCamp/freeCodeCamp">freeCodeCamp</a> (BSD-3-Clause).</p>
  </footer>

  <script>
  let curriculumIndex = null;
  let superblockCache = {};
  let translations = {};
  let currentLang = 'ko';

  function t(key) {
    if (currentLang === 'ko' && translations.ui && translations.ui[key]) return translations.ui[key];
    if (currentLang === 'ko' && translations.superblocks && translations.superblocks[key]) return translations.superblocks[key];
    return null;
  }

  function nameKo(en, key) {
    if (currentLang === 'ko' && translations.superblocks && translations.superblocks[key]) return translations.superblocks[key];
    return en.replace(/-/g, ' ');
  }

  function fmtName(name, key) {
    const ko = nameKo(name, key);
    if (currentLang === 'ko') return ko;
    return name.replace(/-/g, ' ');
  }

  async function loadIndex() {
    const [idxRes, trRes] = await Promise.all([
      fetch('/data/index.json'),
      fetch('/data/ko/translations.json').catch(() => null)
    ]);
    curriculumIndex = await idxRes.json();
    if (trRes) translations = await trRes.json();
    document.getElementById('app').innerHTML = '';
    showSuperblocks();
  }

  async function loadSuperblock(name) {
    if (!superblockCache[name]) {
      const res = await fetch(`/data/sb-${name}.json`);
      superblockCache[name] = await res.json();
    }
    return superblockCache[name];
  }

  function setLang(lang) {
    currentLang = lang;
    document.getElementById('btnKo').className = 'lang-btn' + (lang === 'ko' ? ' active' : '');
    document.getElementById('btnEn').className = 'lang-btn' + (lang === 'en' ? ' active' : '');
    if (window._refresh) window._refresh();
  }

  function showSuperblocks() {
    document.getElementById('breadcrumb').innerHTML = `<span onclick="showSuperblocks()">${t('curriculum') || 'Curriculum'}</span>`;
    const app = document.getElementById('app');
    app.innerHTML = `<div class="sb-list">${curriculumIndex.superblocks.map(sb =>
      `<div class="sb-item" onclick="showBlocks('${sb.name}')">
        <h3>${fmtName(sb.name, sb.name)}</h3>
        <div class="en-name">${sb.name.replace(/-/g, ' ')}</div>
        <div class="count">${sb.blocks.length} ${t('blocks') || 'blocks'}</div>
      </div>`
    ).join('')}</div>`;
    window._refresh = showSuperblocks;
  }

  async function showBlocks(sbName) {
    const app = document.getElementById('app');
    const sbLabel = fmtName(sbName, sbName);
    document.getElementById('breadcrumb').innerHTML =
      `<span onclick="showSuperblocks()">${t('curriculum') || 'Curriculum'}</span> › <span>${sbLabel}</span>`;
    app.innerHTML = '<div class="loading">Loading...</div>';

    const sb = await loadSuperblock(sbName);
    const blocks = sb.blocks.filter(b => b.challenges.length > 0);
    app.innerHTML = `<div class="block-list">${blocks.map(b =>
      `<div class="block-item" onclick="showChallenges('${sbName}','${b.name}')">
        <h4>${b.name.replace(/-/g, ' ')}</h4>
        <div class="count">${b.challenges.length} ${t('challenges') || 'challenges'}</div>
      </div>`
    ).join('')}</div>`;
    window._refresh = () => showBlocks(sbName);
  }

  async function showChallenges(sbName, blockName) {
    const app = document.getElementById('app');
    const sbLabel = fmtName(sbName, sbName);
    document.getElementById('breadcrumb').innerHTML =
      `<span onclick="showSuperblocks()">${t('curriculum') || 'Curriculum'}</span> ›
       <span onclick="showBlocks('${sbName}')">${sbLabel}</span> ›
       <span>${blockName.replace(/-/g, ' ')}</span>`;
    app.innerHTML = '<div class="loading">Loading...</div>';

    const sb = await loadSuperblock(sbName);
    const block = sb.blocks.find(b => b.name === blockName);
    app.innerHTML = `<div class="challenge-list">${block.challenges.slice(0, 100).map((ch, i) =>
      `<div class="challenge-item" onclick="showChallenge('${sbName}','${blockName}',${i})">
        ${i+1}. ${ch.title}
      </div>`
    ).join('')}</div>`;
    window._refresh = () => showChallenges(sbName, blockName);
  }

  async function showChallenge(sbName, blockName, idx) {
    const app = document.getElementById('app');
    const sb = await loadSuperblock(sbName);
    const block = sb.blocks.find(b => b.name === blockName);
    const ch = block.challenges[idx];
    if (!ch) return;

    const render = () => {
      const showKo = currentLang === 'ko';
      app.innerHTML = `<button class="back-btn" onclick="showChallenges('${sbName}','${blockName}')">← ${t('back') || 'Back'}</button>
        <div class="challenge-detail">
          <h2>${ch.title}</h2>
          <div>${ch.description ? ch.description.replace(/\n/g, '<br>') : '<em>No description</em>'}</div>
          ${ch.seed ? `<h3 style="margin-top:1.5rem">${t('seed_code') || 'Seed Code'}</h3><pre>${ch.seed.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</pre>` : ''}
          ${ch.tests.length ? `<h3 style="margin-top:1.5rem">${t('tests') || 'Tests'}</h3>${ch.tests.map(t => `<pre>${t.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</pre>`).join('')}` : ''}
          ${showKo ? `<button class="translate-btn" onclick="translateChallenge('${sbName}','${blockName}',${idx})">🌐 ${t('translate') || 'Translate to Korean'}</button><div id="translation"></div>` : ''}
        </div>`;
    };
    render();
    window._refresh = () => showChallenge(sbName, blockName, idx);
  }

  async function translateChallenge(sbName, blockName, idx) {
    const btn = event.target;
    const el = document.getElementById('translation');
    btn.textContent = '⏳ ' + (translations.ui?.translating || 'Translating...');
    btn.disabled = true;

    const sb = await loadSuperblock(sbName);
    const block = sb.blocks.find(b => b.name === blockName);
    const ch = block.challenges[idx];

    try {
      // Try WebLLM first
      const { CreateMLCEngine } = await import("https://esm.run/@mlc-ai/web-llm");
      const engine = await CreateMLCEngine("gemma-2-2b-it-q4f16_1-MLC", {
        initProgressCallback: (p) => {
          if (p.progress < 1) btn.textContent = `⏳ Loading AI... ${(p.progress * 100).toFixed(0)}%`;
        }
      });

      const text = `Translate this programming lesson to Korean. Keep code blocks unchanged.\n\nTitle: ${ch.title}\n\nDescription:\n${ch.description?.slice(0, 1500)}`;
      const reply = await engine.chat.completions.create({
        messages: [{ role: "user", content: text }],
        max_tokens: 1024,
        temperature: 0.3
      });
      el.innerHTML = `<div style="margin-top:1rem;padding:1rem;background:#1a1a2e;border-radius:8px;border-left:3px solid #7c3aed">${reply.choices[0].message.content.replace(/\n/g, '<br>')}</div>`;
    } catch (e) {
      // Fallback: simple phrase translation
      const fallback = {
        "variable": "변수",
        "function": "함수",
        "array": "배열",
        "object": "객체",
        "string": "문자열",
        "number": "숫자",
        "loop": "반복문",
        "condition": "조건문",
        "class": "클래스",
        "value": "값",
        "store": "저장",
        "assign": "할당",
        "declare": "선언",
        "call": "호출",
        "return": "반환",
        "parameter": "매개변수",
        "argument": "인수",
        "method": "메서드",
        "property": "속성"
      };
      let translated = ch.description || '';
      for (const [en, ko] of Object.entries(fallback)) {
        translated = translated.replace(new RegExp(`\\b${en}\\b`, 'gi'), ko);
      }
      el.innerHTML = `<div style="margin-top:1rem;padding:1rem;background:#1a1a2e;border-radius:8px;border-left:3px solid #f59e0b">
        <small style="color:#f59e0b">⚠️ AI 번역 실패, 기본 번역 적용됨</small><br><br>
        ${translated.replace(/\n/g, '<br>')}
      </div>`;
    }

    btn.textContent = '🌐 ' + (translations.ui?.translate || 'Translate to Korean');
    btn.disabled = false;
  }

  loadIndex();
  </script>
</body>
</html>
