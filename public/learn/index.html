<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Developer Hub - 학습</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0,200" />
    <style>
        .search-bar{display:flex;gap:8px;margin-bottom:24px;max-width:500px}
        .search-bar input{flex:1;padding:10px 16px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:.9rem}
        .search-bar input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-bg)}
        .sb-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:10px}
        .sb-card{padding:20px;border-radius:var(--radius);background:var(--surface);border:1px solid var(--border);cursor:pointer;transition:var(--transition)}
        .sb-card:hover{transform:translateY(-2px);border-color:var(--primary);box-shadow:0 12px 24px -8px rgba(99,102,241,0.12)}
        .sb-card h3{font-family:'Hanken Grotesk',sans-serif;font-size:1rem;margin-bottom:4px}
        .sb-card .sb-meta{font-size:.78rem;color:var(--text-muted)}
        .sb-card .sb-progress{margin-top:8px;height:3px;background:var(--border);border-radius:4px;overflow:hidden}
        .sb-card .sb-progress .fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--secondary));border-radius:4px;transition:width .4s ease}
        .sb-card .sb-done{font-size:.72rem;color:var(--success);margin-top:4px}
        .detail-view{padding:24px;border-radius:var(--radius-lg);background:var(--surface);border:1px solid var(--border)}
        .detail-view h2{font-size:1.2rem;margin-bottom:4px}
        .detail-view .total{font-size:.82rem;color:var(--text-muted);margin-bottom:16px}
        .block-list{display:flex;flex-direction:column;gap:4px}
        .block-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);cursor:pointer;transition:var(--transition);text-decoration:none;color:inherit}
        .block-row:hover{border-color:var(--primary);background:var(--surface-hover)}
        .block-row .info{flex:1}
        .block-row .name{font-size:.88rem;font-weight:500;color:var(--text)}
        .block-row .count{font-size:.75rem;color:var(--text-muted)}
        .block-row .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
        .block-row .dot.some{background:var(--primary)}
        .block-row .dot.all{background:var(--success)}
        .block-row .dot.none{background:var(--border-solid)}
        .back-btn{display:inline-flex;align-items:center;gap:4px;color:var(--text-muted);cursor:pointer;font-size:.85rem;margin-bottom:16px;transition:var(--transition)}
        .back-btn:hover{color:var(--primary)}
        @media(max-width:600px){.sb-cards{grid-template-columns:1fr}}
    </style>
</head>
<body>
    <nav>
        <div class="nav-inner">
            <a href="/" class="logo">
                <span class="logo-icon">✦</span>
                AI Developer Hub
            </a>
            <div class="nav-links">
                <a href="/">Home</a>
                <a href="/learn/" class="active">Learn</a>
                <a href="/editor/">Editor</a>
                <a href="/chat/" class="hide-mobile">Chat</a>
                <a href="/tools/" class="hide-mobile">Tools</a>
                <a href="/login/" id="navAuth">Sign In</a>
            </div>
        </div>
    </nav>

    <main class="container">
        <div class="breadcrumb">
            <a href="/">Home</a><span class="sep">›</span><span id="bcCurrent" class="current">Learn</span>
        </div>

        <div id="mainView">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;margin-bottom:4px">
                <div>
                    <h1 style="margin-bottom:4px">커리큘럼</h1>
                    <p style="color:var(--text-secondary);font-size:.9rem">99개 과목 · 20,000+ 챌린지. 클릭해서 학습을 시작하세요.</p>
                </div>
                <div id="totalProgress" style="font-size:.82rem;color:var(--text-muted);text-align:right">로딩 중...</div>
            </div>
            <div class="search-bar">
                <span class="material-symbols-outlined" style="color:var(--text-muted);position:absolute;margin:10px 0 0 12px;font-size:1.2rem">search</span>
                <input type="text" id="searchInput" placeholder="과목 검색..." oninput="filterSubjects()" style="padding-left:36px">
            </div>
            <div class="sb-cards" id="sbCards"></div>
        </div>

        <div id="detailView" style="display:none">
            <div class="back-btn" onclick="showMainView()">
                <span class="material-symbols-outlined" style="font-size:1.1rem">arrow_back</span>
                모든 과목으로 돌아가기
            </div>
            <div class="detail-view" id="detailContent"></div>
        </div>
    </main>

    <footer><p>© 2026 AI Developer Hub. Built with passion for AI developers.</p></footer>

    <script>
        let allSubjects = [];
        let translations = {};
        let completed = JSON.parse(localStorage.getItem('learnCompleted') || '{}');
        let allChallengeIds = new Set();

        async function init() {
            try {
                const [idxRes, transRes] = await Promise.all([
                    fetch('/data/index.json'),
                    fetch('/data/ko/translations.json')
                ]);
                const idx = await idxRes.json();
                translations = await transRes.json();

                // Load each superblock's data to count challenges and collect IDs
                const superblocks = idx.superblocks || [];
                for (const sb of superblocks) {
                    try {
                        const res = await fetch(`/data/sb-${sb.name}.json`);
                        const data = await res.json();
                        const blocks = data.blocks || [];
                        let totalChallenges = 0;
                        let blockDetails = [];
                        for (const b of blocks) {
                            const challenges = b.challenges || [];
                            totalChallenges += challenges.length;
                            blockDetails.push({
                                name: b.name,
                                count: challenges.length,
                                challengeIds: challenges.map(c => c.id || c.dashedName)
                            });
                            challenges.forEach(c => allChallengeIds.add(c.id || c.dashedName));
                        }
                        allSubjects.push({
                            name: sb.name,
                            blocks: blockDetails,
                            total: totalChallenges
                        });
                    } catch(e) {
                        allSubjects.push({ name: sb.name, blocks: [], total: 0 });
                    }
                }
                renderSubjects(allSubjects);
                updateTotalProgress();
            } catch(e) {
                document.getElementById('sbCards').innerHTML = `<p style="color:var(--error)">데이터를 불러오지 못했습니다: ${e.message}</p>`;
            }
        }

        function t(name) {
            return translations?.superblocks?.[name] || name.replace(/-/g, ' ');
        }

        function getProgress(subjName) {
            const sb = allSubjects.find(s => s.name === subjName);
            if (!sb) return { done: 0, total: 0 };
            let done = 0, total = 0;
            for (const b of sb.blocks) {
                for (const cid of b.challengeIds) {
                    total++;
                    if (completed[cid]) done++;
                }
            }
            return { done, total };
        }

        function renderSubjects(list) {
            const container = document.getElementById('sbCards');
            if (!list.length) {
                container.innerHTML = '<p style="color:var(--text-muted)">검색 결과가 없습니다.</p>';
                return;
            }
            container.innerHTML = list.map(sb => {
                const { done, total } = getProgress(sb.name);
                const pct = total ? Math.round(done/total*100) : 0;
                return `<div class="sb-card" onclick="showDetail('${sb.name}')">
                    <h3>${t(sb.name)}</h3>
                    <div class="sb-meta">${sb.total.toLocaleString()}개 챌린지</div>
                    ${total > 0 ? `
                        <div class="sb-progress"><div class="fill" style="width:${pct}%"></div></div>
                        <div class="sb-done">${done}/${total} 완료 (${pct}%)</div>
                    ` : ''}
                </div>`;
            }).join('');
        }

        function filterSubjects() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allSubjects.filter(sb => t(sb.name).toLowerCase().includes(q));
            renderSubjects(filtered);
        }

        function showDetail(subjName) {
            const sb = allSubjects.find(s => s.name === subjName);
            if (!sb) return;
            document.getElementById('mainView').style.display = 'none';
            document.getElementById('detailView').style.display = 'block';
            document.getElementById('bcCurrent').textContent = t(subjName);

            let totalDone = 0, totalAll = 0;
            const blocksHtml = sb.blocks.map(b => {
                let done = 0;
                for (const cid of b.challengeIds) {
                    totalAll++;
                    if (completed[cid]) { done++; totalDone++; }
                }
                const status = done === b.count ? 'all' : done > 0 ? 'some' : 'none';
                return `<a href="/editor/?sb=${sb.name}&block=${b.name}&idx=0" class="block-row">
                    <span class="dot ${status}"></span>
                    <div class="info">
                        <div class="name">${b.name.replace(/-/g, ' ')}</div>
                        <div class="count">${b.count}개 챌린지 ${done > 0 ? `· ${done} 완료` : ''}</div>
                    </div>
                    <span class="material-symbols-outlined" style="color:var(--text-muted);font-size:1.1rem">chevron_right</span>
                </a>`;
            }).join('');

            const pct = totalAll ? Math.round(totalDone/totalAll*100) : 0;
            document.getElementById('detailContent').innerHTML = `
                <h2>${t(subjName)}</h2>
                <div class="total">${sb.total.toLocaleString()}개 챌린지 · ${sb.blocks.length}개 블록</div>
                <div style="margin-bottom:16px">
                    <div style="height:4px;background:var(--border);border-radius:4px;overflow:hidden">
                        <div style="height:100%;width:${pct}%;background:linear-gradient(90deg,var(--primary),var(--secondary));border-radius:4px;transition:width .4s"></div>
                    </div>
                    <div style="font-size:.78rem;color:var(--text-muted);margin-top:4px">${totalDone}/${totalAll} 완료 (${pct}%)</div>
                </div>
                <div class="block-list">${blocksHtml}</div>
            `;
        }

        function showMainView() {
            document.getElementById('mainView').style.display = 'block';
            document.getElementById('detailView').style.display = 'none';
            document.getElementById('bcCurrent').textContent = 'Learn';
        }

        function updateTotalProgress() {
            const total = allChallengeIds.size;
            const done = Object.keys(completed).filter(k => allChallengeIds.has(k)).length;
            const pct = total ? Math.round(done/total*100) : 0;
            document.getElementById('totalProgress').innerHTML = total
                ? `${done.toLocaleString()} / ${total.toLocaleString()} 완료 · ${pct}%`
                : `20,000+ 챌린지`;
        }

        // Auth
        (function(){
            const fccUser = JSON.parse(localStorage.getItem('fcc_user') || 'null');
            const navAuth = document.getElementById('navAuth');
            if(fccUser){
                navAuth.textContent = fccUser.name || fccUser.email || 'My Profile';
                navAuth.href = '/profile/';
            }
        })();

        init();
    </script>
</body>
</html>
