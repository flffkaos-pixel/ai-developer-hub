<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile - AI Developer Hub</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0,200" />
  <style>
  .profile-header{display:flex;align-items:center;gap:20px;margin-bottom:28px;padding:24px;border-radius:var(--radius-lg);background:var(--surface);border:1px solid var(--border)}
  .avatar{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--secondary));display:flex;align-items:center;justify-content:center;font-size:1.6rem;color:var(--bg);font-weight:700;flex-shrink:0}
  .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:28px}
  .stat-card{padding:20px;border-radius:var(--radius);background:var(--surface);border:1px solid var(--border);text-align:center;transition:var(--transition)}
  .stat-card:hover{border-color:var(--primary)}
  .stat-card .value{font-family:'Hanken Grotesk',sans-serif;font-size:2rem;font-weight:700;background:linear-gradient(135deg,var(--primary),var(--secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .stat-card .label{color:var(--text-muted);font-size:.85rem;margin-top:4px}
  .xp-bar-wrap{background:var(--border);border-radius:999px;height:10px;overflow:hidden;margin:8px 0}
  .xp-bar-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--secondary));border-radius:999px;transition:width .5s ease}
  .badge-grid{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px}
  .badge-item{width:56px;height:56px;border-radius:50%;background:var(--surface);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1.4rem;transition:var(--transition);position:relative}
  .badge-item:hover{border-color:var(--primary);transform:scale(1.1)}
  .badge-item.locked{opacity:.3;filter:grayscale(.8)}
  .badge-item .tooltip{display:none;position:absolute;bottom:-28px;background:var(--surface-solid);border:1px solid var(--border);padding:4px 10px;border-radius:6px;font-size:.72rem;white-space:nowrap;z-index:10;color:var(--text-secondary)}
  .badge-item:hover .tooltip{display:block}
  .challenge-list{display:flex;flex-direction:column;gap:4px;max-height:400px;overflow-y:auto;margin-top:8px}
  .challenge-row{padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:.85rem;display:flex;justify-content:space-between;color:var(--text-secondary);transition:var(--transition)}
  .challenge-row:hover{border-color:var(--primary)}
  .challenge-row .date{color:var(--text-muted);font-size:.78rem}
  .btn-logout{padding:8px 20px;border-radius:var(--radius-sm);border:1px solid var(--error);color:var(--error);background:transparent;cursor:pointer;font-size:.85rem;font-weight:500;transition:var(--transition);margin-left:auto}
  .btn-logout:hover{background:rgba(255,180,171,0.1)}
  .section-title{font-family:'Hanken Grotesk',sans-serif;font-size:1.1rem;margin:24px 0 8px;color:var(--text)}
  </style>
</head>
<body>
  <nav>
    <div class="nav-inner">
      <a href="/" class="logo">
        <span class="logo-icon">✦</span>
        AI Developer Hub
      </a>
      <div class="nav-links">
        <a href="/">Home</a>
        <a href="/learn/">Learn</a>
        <a href="/editor/">Editor</a>
        <a href="/chat/" class="hide-mobile">Chat</a>
        <a href="/tools/" class="hide-mobile">Tools</a>
        <a href="/login/" id="navAuth">Sign In</a>
      </div>
    </div>
  </nav>

  <main class="container" id="app">
    <div class="breadcrumb">
      <a href="/">Home</a><span class="sep">›</span><span class="current">Profile</span>
    </div>
    <div class="loading" style="text-align:center;padding:60px;color:var(--text-muted)">Loading profile...</div>
  </main>

  <footer><p>© 2026 AI Developer Hub. Built with passion for AI developers.</p></footer>

  <script>
    const BADGE_DEFS = {
      first_challenge: { icon: '🌟', name: 'First Steps', desc: 'Complete your first challenge' },
      '10_challenges': { icon: '🔥', name: 'Getting Started', desc: 'Complete 10 challenges' },
      '50_challenges': { icon: '💪', name: 'Committed', desc: 'Complete 50 challenges' },
      '100_challenges': { icon: '🏆', name: 'Century', desc: 'Complete 100 challenges' },
      streak_7: { icon: '📅', name: 'Weekly Warrior', desc: '7-day streak' },
      streak_30: { icon: '🔥', name: 'Unstoppable', desc: '30-day streak' }
    };
    const badgeKeys = Object.keys(BADGE_DEFS);

    async function load() {
      const userData = localStorage.getItem('fcc_user');
      const token = localStorage.getItem('fcc_token');
      const app = document.getElementById('app');

      if (!token || !userData) {
        app.innerHTML = `<div style="text-align:center;padding:60px">
          <span class="material-symbols-outlined" style="font-size:3rem;color:var(--text-muted);margin-bottom:12px;opacity:.5">account_circle</span>
          <h2>Not logged in</h2>
          <p style="color:var(--text-muted);margin:12px 0">
            <a href="/login/">Sign In</a> or <a href="/register/">Register</a>
          </p>
        </div>`;
        return;
      }

      const user = JSON.parse(userData);
      try {
        const [progressRes, authRes] = await Promise.all([
          fetch(`/api/progress?userId=${user.id}`),
          fetch('/api/auth', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({action:'me',token}) })
        ]);
        const progressData = await progressRes.json();
        const authData = await authRes.json();

        if (authData.user) {
          localStorage.setItem('fcc_user', JSON.stringify(authData.user));
          user.xp = authData.user.xp;
          user.level = authData.user.level;
          user.streak = authData.user.streak;
        }

        const completed = progressData.completed || [];
        const badges = progressData.badges || [];
        const earnedBadges = new Set(badges.map(b => b.badge_type));
        if (user.streak >= 7) earnedBadges.add('streak_7');
        if (user.streak >= 30) earnedBadges.add('streak_30');

        const xpInLevel = user.xp % 100;
        const xpProgress = (xpInLevel / 100) * 100;

        const navAuth = document.getElementById('navAuth');
        navAuth.textContent = user.name || user.email || 'Profile';
        navAuth.href = '/profile/';

        app.innerHTML = `
          <div class="profile-header">
            <div class="avatar">${(user.email||user.name||'U')[0].toUpperCase()}</div>
            <div>
              <h2 style="font-family:'Hanken Grotesk',sans-serif;font-size:1.3rem">${user.name || user.email}</h2>
              <p style="color:var(--text-muted);font-size:.85rem">${user.email}</p>
            </div>
            <button class="btn-logout" onclick="logout()">Logout</button>
          </div>

          <div class="stats-grid">
            <div class="stat-card"><div class="value">${user.xp}</div><div class="label">Total XP</div></div>
            <div class="stat-card"><div class="value">${user.level}</div><div class="label">Level</div></div>
            <div class="stat-card"><div class="value">${user.streak || 0}</div><div class="label">Day Streak</div></div>
            <div class="stat-card"><div class="value">${completed.length}</div><div class="label">Challenges</div></div>
          </div>

          <div class="section-title">Level ${user.level} — Progress to Level ${user.level + 1}</div>
          <div class="xp-bar-wrap"><div class="xp-bar-fill" style="width:${xpProgress}%"></div></div>
          <p style="text-align:right;color:var(--text-muted);font-size:.82rem">${xpInLevel} / 100 XP</p>

          <div class="section-title">Badges (${earnedBadges.size} / ${badgeKeys.length})</div>
          <div class="badge-grid">${badgeKeys.map(k => {
            const b = BADGE_DEFS[k];
            const earned = earnedBadges.has(k);
            return `<div class="badge-item${earned ? '' : ' locked'}">${b.icon}<div class="tooltip">${b.name} — ${b.desc}</div></div>`;
          }).join('')}</div>

          <div class="section-title">Completed Challenges (${completed.length})</div>
          <div class="challenge-list">${completed.length
            ? completed.map(c => `<div class="challenge-row"><span>${c.challenge_id}</span><span class="date">${c.completed_at}</span></div>`).join('')
            : '<p style="color:var(--text-muted);font-size:.88rem;padding:12px">No challenges completed yet. <a href="/learn/">Start learning!</a></p>'}</div>
        `;
      } catch(e) {
        app.innerHTML = `<p style="color:var(--text-muted)">Error loading profile. <button class="btn btn-sm" onclick="load()">Retry</button></p>`;
      }
    }

    function logout() {
      localStorage.removeItem('fcc_token');
      localStorage.removeItem('fcc_user');
      window.location.href = '/';
    }

    load();
  </script>
</body>
</html>
